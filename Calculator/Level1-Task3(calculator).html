<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <title>Calculator</title>
</head>
<body class="m-0 p-0">
    <div class="w-full flex mt-20 justify-center align-middle items-center bg-gray-800">
        <div class="max-w-sm bg-gray-600 flex flex-col rounded-md border border-gray-500 shadow-lg">
            <input id="display" type="text" class="overflow-x-auto h-14 text-6xl bg-gray-200 m-5 shadow-xl font-bold text-right text-gray-600 tracking-[0.15em] rounded-md" style="font-family: 'DS-Digital', sans-serif;" placeholder="0" readonly>
            <div class="grid grid-rows-5 grid-cols-4 gap-4 m-5 font-bold text-lg">
                <button onclick="clearDisplay()" class="shadow-md rounded-md h-14 bg-gray-300 col-span-2 hover:bg-gray-400 transition duration-200">C</button>
                <button onclick="deleteLast()" class="shadow-md rounded-md h-14 flex justify-center items-center bg-gray-300 hover:bg-gray-400 transition duration-200"><img src="/images/backspace.png" height="28px" width="28px" loading="lazy"></button>
                <button onclick="appendOperator('/')" class="shadow-md rounded-md h-14 flex justify-center items-center bg-gray-300 hover:bg-gray-400 transition duration-200"><img src="/images/divide.png" height="23px" width="23px" loading="lazy"></button>
                <button onclick="appendValue('7')" class="shadow-md rounded-md h-14 bg-gray-300 hover:bg-gray-400 transition duration-200">7</button>
                <button onclick="appendValue('8')" class="shadow-md rounded-md h-14 bg-gray-300 hover:bg-gray-400 transition duration-200">8</button>
                <button onclick="appendValue('9')" class="shadow-md rounded-md h-14 bg-gray-300 hover:bg-gray-400 transition duration-200">9</button>
                <button onclick="appendOperator('*')" class="shadow-md rounded-md h-14 text-xl flex justify-center items-center bg-gray-300 hover:bg-gray-400 transition duration-200">x</button>
                <button onclick="appendValue('4')" class="shadow-md rounded-md h-14 bg-gray-300 hover:bg-gray-400 transition duration-200">4</button>
                <button onclick="appendValue('5')" class="shadow-md rounded-md h-14 bg-gray-300 hover:bg-gray-400 transition duration-200">5</button>
                <button onclick="appendValue('6')" class="shadow-md rounded-md h-14 bg-gray-300 hover:bg-gray-400 transition duration-200">6</button>
                <button onclick="appendOperator('-')" class="shadow-md rounded-md h-14 text-3xl flex justify-center items-center bg-gray-300 hover:bg-gray-400 transition duration-200">-</button>
                <button onclick="appendValue('1')" class="shadow-md rounded-md h-14 bg-gray-300 hover:bg-gray-400 transition duration-200">1</button>
                <button onclick="appendValue('2')" class="shadow-md rounded-md h-14 bg-gray-300 hover:bg-gray-400 transition duration-200">2</button>
                <button onclick="appendValue('3')" class="shadow-md rounded-md h-14 bg-gray-300 hover:bg-gray-400 transition duration-200">3</button>
                <button onclick="appendOperator('+')" class="shadow-md rounded-md h-14 text-xl flex justify-center items-center bg-gray-300 hover:bg-gray-400 transition duration-200">+</button>
                <button onclick="appendValue('0')" class="shadow-md rounded-md h-14 bg-gray-300 col-span-2 hover:bg-gray-400 transition duration-200">0</button>
                <button onclick="appendDecimal('.')" class="shadow-md rounded-md h-14 bg-gray-300 hover:bg-gray-400 transition duration-200">.</button>
                <button onclick="calculate()" class="shadow-md bg-blue-400 text-xl flex justify-center items-center rounded-md h-14 hover:bg-blue-500 transition duration-200 ">=</button>
            </div>
        </div>
    </div>
    <script>
        const display = document.getElementById('display');

        document.addEventListener('keydown', (event)=>{
                if(!isNaN(event.key)){
                    appendValue(event.key);
                }
                if(event.key === 'Enter'){
                    calculate();
                }
                if(event.key === 'Backspace'){
                    deleteLast();
                }
                if(event.key === '.'){
                    appendDecimal('.')
                }
                if(event.key === "+" || event.key === "-" || event.key === "*" || event.key === "/"){
                    appendOperator(event.key);
                }
            }
        );

        function appendValue(value) {
            if (display.value === "Cannot divide by zero" || display.value === "Error") {
                display.value = value;
                return;
            }
            if (display.value === "0") {
                display.value = value;
            } else {
                display.value += value;
            }
        }
        function clearDisplay() {
            display.value = '0';
        }
        function deleteLast() {
            display.value = display.value.slice(0, -1) || '0';
        }
        function calculate(){
            try{
                if(display.value.trim() === ''){
                    return;
                }
                let result = eval(display.value);

                if(result === Infinity || result === -Infinity){
                    display.value = 'Error';
                    return;
                }
                display.value = result;
            }
            catch{
                display.value = 'Error';
            }
        }
        function appendOperator(operator) {
            if(display.value === "") return;
            let lastChar = display.value.slice(-1);
            if(lastChar === '+' || lastChar === '-' || lastChar === '*' || lastChar === '/' || lastChar === '.'){ 
                //7+* waali condition
                return;
            }
            display.value += operator;
        }
        function appendDecimal(decimal) {
            if (display.value === "") {
                display.value = "0.";
                return;
            }
            else {
                let lastChar = display.value.slice(-1);
                if (lastChar !== '.') {
                    display.value += decimal;
                }
            }
        }
    </script>
</body>
</html>
